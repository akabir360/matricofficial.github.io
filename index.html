<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Official Store</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      margin: 0;
      text-align: center;
    }

    header {
      padding: 40px;
      font-size: 28px;
      font-weight: bold;
    }

    .product {
      margin-top: 50px;
    }

    img {
      width: 250px;
      border-radius: 10px;
    }

    .price {
      font-size: 22px;
      margin: 15px 0;
    }

    button {
      background: #00ff99;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background: #00cc77;
    }
  </style>
</head>

<body>

  <header>
    Matrix Official Store
  </header>

  <div class="product">
    <img src="https://via.placeholder.com/250" alt="Product">
    
    <h2>Matrix Product #1</h2>
    
    <div class="price">$29.99</div>

    <!-- Replace this link with your Stripe checkout link -->
    <a href="https://buy.stripe.com/test_link_here">
      <button>Buy Now</button>
    </a>
  </div>

</body>
</html>
