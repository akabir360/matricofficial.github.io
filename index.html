<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Official Store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 30px;
      background: #111;
      color: white;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
    }

    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    /* CONTAINER */
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 30px;
    }

    /* CAROUSEL */
    .carousel {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: auto;
    }

    .carousel img {
      width: 100%;
      border-radius: 12px;
      display: none;
    }

    .carousel img.active {
      display: block;
    }

    .buttons {
      text-align: center;
      margin-top: 10px;
    }

    button {
      padding: 8px 15px;
      margin: 5px;
      border: none;
      cursor: pointer;
      background: #111;
      color: white;
      border-radius: 5px;
    }

    /* PRODUCT */
    .product {
      text-align: center;
      margin-top: 30px;
    }

    .price {
      font-size: 22px;
      color: green;
      margin: 10px 0;
    }

    .buy {
      display: inline-block;
      padding: 12px 25px;
      background: green;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 30px;
      margin-top: 40px;
      color: gray;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo">
    <span>Matrix Store</span>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Product</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="container">

  <!-- CAROUSEL -->
  <div class="carousel">
    <img src="product1.jpg" class="active">
    <img src="product2.jpg">
    <img src="product3.jpg">
  </div>

  <div class="buttons">
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
  </div>

  <!-- PRODUCT -->
  <div class="product">
    <h2>Matrix Product #1</h2>
    <p>High quality official Matrix product.</p>

    <div class="price">$29.99</div>

    <a class="buy" href="https://stripe.com">
      Buy Now
    </a>
  </div>

</div>

<footer>
  © 2026 Matrix Official Store
</footer>

<script>
  let index = 0;
  const images = document.querySelectorAll(".carousel img");

  function show(i) {
    images.forEach(img => img.classList.remove("active"));
    images[i].classList.add("active");
  }

  function next() {
    index = (index + 1) % images.length;
    show(index);
  }

  function prev() {
    index = (index - 1 + images.length) % images.length;
    show(index);
  }
</script>

</body>
</html>
